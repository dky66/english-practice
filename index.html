<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游轮针灸师英语口语练习</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3ef;color:#1a1a1a;min-height:100vh;font-size:16px}
.header{background:#fff;border-bottom:1px solid #e5e5e0;height:52px;display:flex;align-items:center;padding:0 1rem;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:15px;font-weight:500;flex:1}
.back-btn{background:none;border:none;cursor:pointer;font-size:22px;color:#555;line-height:1;padding:4px;display:none}
.back-btn.on{display:block}
.btn-nb{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.screen{display:none}
.screen.on{display:block}

/* HOME */
.home{padding:1.5rem 1rem;max-width:700px;margin:0 auto}
.home-h{font-size:20px;font-weight:500;margin-bottom:4px}
.home-sub{font-size:13px;color:#777;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.sc-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1rem 1.2rem;cursor:pointer;transition:border-color .15s,transform .1s}
.sc-card:hover{border-color:#aaa}
.sc-card:active{transform:scale(.98)}
.sc-num{font-size:11px;color:#999;font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.sc-title{font-size:15px;font-weight:500}
.sc-en{font-size:12px;color:#888;margin-top:1px}
.sc-desc{font-size:13px;color:#666;margin-top:6px;line-height:1.5}

/* TABS */
.sc-hd{background:#fff;border-bottom:1px solid #e5e5e0;padding:1rem 1rem .5rem}
.sc-hd h2{font-size:17px;font-weight:500}
.sc-hd p{font-size:13px;color:#777;margin-top:3px}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5e0;padding:0 1rem;overflow-x:auto;gap:0}
.tab{padding:11px 16px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:#777;white-space:nowrap;flex-shrink:0}
.tab.on{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.panel{display:none;padding:1rem;max-width:700px;margin:0 auto}
.panel.on{display:block}

/* FLASHCARD */
.fc-meta{font-size:13px;color:#777;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.fc-wrap{perspective:800px;margin-bottom:1.2rem}
.fc-inner{position:relative;width:100%;height:180px;transform-style:preserve-3d;transition:transform .45s;cursor:pointer}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center}
.fc-front{background:#fff;border:1px solid #e5e5e0}
.fc-back{background:#1a1a1a;color:#fff;transform:rotateY(180deg)}
.fc-word{font-size:26px;font-weight:500;margin-bottom:8px}
.fc-hint{font-size:13px;color:#aaa}
.fc-zh{font-size:22px;font-weight:500;margin-bottom:6px}
.fc-ex{font-size:13px;color:#ccc;line-height:1.5;font-style:italic}
.fc-btns{display:flex;gap:10px;justify-content:center;margin-bottom:1rem}
.fc-wrong{background:#fff;border:1.5px solid #e55;color:#e55;border-radius:10px;padding:10px 28px;font-size:15px;cursor:pointer;font-weight:500}
.fc-right{background:#1a1a1a;border:1.5px solid #1a1a1a;color:#fff;border-radius:10px;padding:10px 28px;font-size:15px;cursor:pointer;font-weight:500}
.fc-tts{background:none;border:none;cursor:pointer;font-size:13px;color:#888;margin-top:8px}
.fc-progress{background:#e8e8e4;border-radius:4px;height:4px;margin-bottom:1.2rem}
.fc-prog-bar{background:#1a1a1a;height:4px;border-radius:4px;transition:width .3s}
.fc-done{text-align:center;padding:2rem 1rem;background:#fff;border-radius:14px;border:1px solid #e5e5e0}
.fc-done h3{font-size:18px;font-weight:500;margin-bottom:8px}
.fc-done p{font-size:14px;color:#666;margin-bottom:1.2rem}
.fc-restart{background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:14px;cursor:pointer;margin:4px}
.fc-nb-btn{background:#fff;border:1.5px solid #1a1a1a;border-radius:10px;padding:10px 24px;font-size:14px;cursor:pointer;margin:4px}

/* DIALOGUE */
.dlg-sel{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.dlg-opt{background:#fff;border:1px solid #e5e5e0;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#555}
.dlg-opt.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.dlg-list{display:flex;flex-direction:column;gap:10px}
.dlg-line{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:12px 14px}
.dlg-role{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.dlg-role.you{color:#0a7a50}
.dlg-role.them{color:#5a4ab0}
.dlg-en{font-size:14px;line-height:1.65}
.dlg-zh{font-size:12px;color:#888;margin-top:4px;line-height:1.5}
.dlg-tts{background:none;border:1px solid #e5e5e0;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;color:#666;margin-top:7px}
.dlg-tts:hover{background:#f5f5f2}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:380px}
.chat-role-info{background:#f0f5ff;border:1px solid #c8d8f5;border-radius:8px;padding:9px 12px;font-size:13px;color:#3355aa;margin-bottom:10px;line-height:1.5}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:4px}
.msg-sys{align-self:center;background:#efefeb;color:#666;font-size:12px;padding:5px 14px;border-radius:20px;max-width:90%;text-align:center;line-height:1.5}
.msg-user{align-self:flex-end;background:#1a1a1a;color:#fff;border-radius:12px 12px 3px 12px;padding:10px 14px;max-width:82%;font-size:14px;line-height:1.6}
.msg-ai-wrap{align-self:flex-start;max-width:86%}
.msg-ai{background:#fff;border:1px solid #e5e5e0;border-radius:12px 12px 12px 3px;padding:10px 14px;font-size:14px;line-height:1.6}
.correction{margin-top:7px;border-radius:8px;padding:8px 11px;font-size:13px;line-height:1.55}
.correction.ok{background:#edfaf4;border:1px solid #9decc5;color:#1a7a4a}
.correction.err{background:#fff5f0;border:1px solid #f5c0a0;color:#7a3010}
.correction .label{font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.correction .orig{color:#c05020;text-decoration:line-through;margin-bottom:2px}
.correction .fix{color:#1a5a3a;margin-bottom:4px}
.correction .tip{color:#7a4020}
.ai-tts{background:#f5f5f2;border:1px solid #e5e5e0;border-radius:8px;cursor:pointer;font-size:14px;color:#555;padding:7px 14px;margin-top:8px;display:inline-block}
.chat-in-area{padding-top:10px;display:flex;gap:8px;align-items:flex-end}
.chat-in{flex:1;border:1px solid #e5e5e0;border-radius:10px;padding:9px 13px;font-size:14px;font-family:inherit;resize:none;max-height:110px;outline:none;background:#fff}
.chat-in:focus{border-color:#888}
.chat-send{background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:14px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.mic-area{text-align:center;padding:10px 0 0}
.mic-big{background:#1a1a1a;color:#fff;border:none;border-radius:50px;padding:14px 36px;font-size:15px;font-weight:500;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;transition:background .15s,transform .1s;letter-spacing:.3px}
.mic-big:active,.mic-big.listening{background:#d93025;transform:scale(1.04)}
.mic-hint{font-size:12px;color:#aaa;margin-top:7px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ERROR NOTEBOOK */
.nb-screen{padding:1rem;max-width:700px;margin:0 auto}
.nb-screen h2{font-size:18px;font-weight:500;margin-bottom:4px}
.nb-screen .sub{font-size:13px;color:#777;margin-bottom:1.2rem}
.nb-empty{text-align:center;padding:3rem 1rem;color:#888;font-size:14px}
.nb-scenario{margin-bottom:1.5rem}
.nb-sc-title{font-size:13px;font-weight:500;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.nb-word{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.nb-word-main{flex:1}
.nb-en{font-size:15px;font-weight:500;margin-bottom:2px}
.nb-zh{font-size:13px;color:#777;margin-bottom:5px}
.nb-ex{font-size:13px;color:#555;line-height:1.5;font-style:italic}
.nb-actions{display:flex;gap:6px;flex-shrink:0}
.nb-tts{background:none;border:1px solid #e5e5e0;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;color:#666}
.nb-del{background:none;border:1px solid #f5c0c0;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;color:#c03030}
.nb-del:hover{background:#fff5f5}

@media(max-width:480px){
.msg-user,.msg-ai-wrap{max-width:93%}
.fc-word{font-size:22px}
.fc-zh{font-size:19px}
}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goHome()">←</button>
  <h1 id="hTitle">🌊 游轮英语口语练习</h1>
  <button class="btn-nb" onclick="openNB()">📒 错词本</button>
</div>

<div class="screen on" id="homeScr">
  <div class="home">
    <p class="home-h">选择练习场景</p>
    <p class="home-sub">词汇闪卡 · 对话范本 · AI自由对话（实时纠错）</p>
    <div class="grid" id="homeGrid"></div>
  </div>
</div>

<div class="screen" id="scScr">
  <div class="sc-hd"><h2 id="scTitle"></h2><p id="scDesc"></p></div>

    <div class="tab" data-tab="fc" onclick="switchTab('fc')">📚 词汇闪卡</div>
    <div class="tab" data-tab="dlg" onclick="switchTab('dlg')">💬 对话范本</div>
    <div class="tab" data-tab="chat" onclick="switchTab('chat')">🎯 自由练习</div>
  </div>
  <div class="panel" id="panel-fc"></div>
  <div class="panel" id="panel-dlg"></div>
  <div class="panel" id="panel-chat">
    <div class="chat-wrap">
      <div class="chat-role-info" id="chatRoleInfo"></div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-in-area">
        <textarea class="chat-in" id="chatIn" rows="1" placeholder="输入英语，Enter 发送…" onkeydown="chatKey(event)" oninput="autoH(this)"></textarea>
        <button class="chat-send" id="sendBtn" onclick="sendChat()">发送</button>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="nbScr">
  <div class="nb-screen">
    <h2>📒 错词本</h2>
    <p class="sub">标记为「不认识」的单词，点击🔊听发音，记住后可删除</p>
    <div id="nbContent"></div>
  </div>
</div>

    {en:'pacemaker',zh:'心脏起搏器',ex:'Do you have a pacemaker?'},
    {en:'metal implant',zh:'金属植入物',ex:'Do you have any metal implants?'},
    {en:'blood thinner',zh:'血液稀释剂',ex:'Are you on any blood thinners?'},
    {en:'pregnant',zh:'怀孕的',ex:'Are you pregnant or trying to conceive?'},
    {en:'previous surgery',zh:'过往手术',ex:'Have you had any previous surgery?'},
    {en:'sleep quality',zh:'睡眠质量',ex:'How is your sleep quality lately?'},

    {en:'lifestyle',zh:'生活方式',ex:'Tell me a bit about your lifestyle.'},

  dialogues:[
    {title:'对话一：慢性腰痛患者',lines:[
      {r:'you',en:'So, what brings you in today?',zh:'那么，您今天来是为了什么？'},
      {r:'them',en:'I\'ve been dealing with lower back pain for about three months now. It\'s really affecting my daily life.',zh:'我已经有腰痛大概三个月了。真的影响到我的日常生活了。'},
      {r:'you',en:'I understand. On a scale of 1 to 10, how would you rate the pain right now?',zh:'我明白。以1到10分来评级，您现在的疼痛是几分？'},
      {r:'them',en:'I\'d say about a 6. It gets worse if I sit for a long time — like on the plane here.',zh:'我会说大概6分。如果久坐会加重——比如来这里坐飞机的时候。'},
      {r:'you',en:'Is the pain in one specific spot, or does it radiate down your leg at all?',zh:'疼痛是集中在一个特定位置，还是有向腿部放射的感觉？'},
      {r:'them',en:'Mostly in the lower back, but sometimes it goes down the left leg a little.',zh:'主要在下背部，但有时候会稍微放射到左腿。'},
      {r:'you',en:'Are you currently taking any medications for the pain or for anything else?',zh:'您目前有在服用任何止痛药或其他药物吗？'},
      {r:'them',en:'I take ibuprofen when it\'s bad, and I\'m also on lisinopril for blood pressure.',zh:'疼痛严重时我会吃布洛芬，我也在服用赖诺普利控制血压。'},
      {r:'you',en:'Thank you. Do you have a pacemaker or any metal implants in your body?',zh:'谢谢您。您有心脏起搏器或身体内有金属植入物吗？'},
      {r:'them',en:'No, nothing like that.',zh:'没有，没有那些。'},
      {r:'you',en:'And any allergies to medications or metals that you know of?',zh:'您有任何已知的药物或金属过敏吗？'},
      {r:'them',en:'Not that I\'m aware of, no.',zh:'我不知道有，没有。'},
    ]},
    {title:'对话二：失眠和焦虑患者',lines:[
      {r:'them',en:'I\'ve been having terrible sleep. I lie awake for hours just worrying about everything.',zh:'我一直睡得很差。我会躺着几个小时，担心各种事情。'},
      {r:'you',en:'That sounds exhausting. How long has this been going on?',zh:'听起来很累。这种情况持续多久了？'},
      {r:'them',en:'About six months. I\'ve tried everything — melatonin, relaxation apps, nothing works.',zh:'大概六个月。我什么都试过了——褪黑素、放松App，什么都没用。'},
      {r:'you',en:'Acupuncture can be very effective for insomnia and anxiety. Do you have any physical symptoms along with the sleep issues?',zh:'针灸对失眠和焦虑非常有效。除了睡眠问题，您还有其他身体症状吗？'},
      {r:'them',en:'Yes, I get tension headaches almost every day, and my shoulders are constantly tight.',zh:'有的，我几乎每天都有紧张性头痛，而且肩膀一直很紧绷。'},
      {r:'you',en:'I see. Are you taking anything for the headaches or anxiety?',zh:'我明白了。您有在服用任何头痛或焦虑的药物吗？'},
      {r:'them',en:'Just some over-the-counter painkillers for the headaches. No prescription meds.',zh:'头痛时只吃非处方止痛药。没有处方药。'},
      {r:'you',en:'Good. And how would you describe your overall stress level on a scale of 1 to 10?',zh:'好的。以1到10分来描述，您的整体压力水平是几分？'},
      {r:'them',en:'Honestly? A solid 8. Work has been really overwhelming.',zh:'说实话？实实在在的8分。工作一直让我感到很大压力。'},
    ]},
    {title:'对话三：运动损伤患者',lines:[
      {r:'them',en:'I hurt my shoulder playing tennis about two weeks ago. The doctor said it\'s a rotator cuff strain.',zh:'我大约两周前打网球时伤了肩膀。医生说是旋转肌腱劳损。'},
      {r:'you',en:'I\'m sorry to hear that. Is the pain constant, or only when you move the shoulder?',zh:'很抱歉听到这个。疼痛是持续性的，还是只在活动肩膀时才有？'},
      {r:'them',en:'Mostly when I move it — especially lifting my arm above my head.',zh:'主要是活动时——特别是把手臂举过头顶的时候。'},
      {r:'you',en:'On a scale of 1 to 10?',zh:'以1到10分来评级呢？'},
      {r:'them',en:'About a 5 resting, maybe a 7 or 8 when I try to reach for something.',zh:'休息时大概5分，当我试图够东西的时候可能7到8分。'},
      {r:'you',en:'Have you had any imaging done — an X-ray or MRI?',zh:'您有做过影像检查吗——X光或MRI？'},
      {r:'them',en:'An ultrasound. No tears, just inflammation and strain.',zh:'做过超声波。没有撕裂，只是炎症和劳损。'},
      {r:'you',en:'Acupuncture can help significantly with both inflammation and the surrounding muscle tension. Are you taking any anti-inflammatory medication?',zh:'针灸对炎症和周围肌肉紧张都很有帮助。您有在服用任何消炎药吗？'},
      {r:'them',en:'I was on naproxen for the first week, but I\'ve stopped it now.',zh:'我在第一周服用了萘普生，但现在已经停了。'},
    ]},
  ]
},
{
  num:'03', title:'解释针灸疗法', titleEn:'Explaining Acupuncture', desc:'介绍原理、消除顾虑、设定预期',
  aiRoleZh:'对针灸好奇但有顾虑的游轮乘客',
  systemPrompt:`You are an English-speaking cruise passenger who is curious but has concerns about acupuncture. You ask realistic questions first-timers ask. Respond in TWO sections separated ONLY by "---SPLIT---":
Section 1: Stay in character. Ask questions or react naturally (1-3 sentences).
Section 2: JSON — if errors: {"ok":false,"original":"phrase","corrected":"better","tip":"中文说明"} — if fine: {"ok":true,"msg":"鼓励"}`,
  vocab:[
    {en:'meridian',zh:'经络',ex:'Qi flows along meridians in the body.'},
    {en:'acupuncture point',zh:'穴位',ex:'I\'ll target specific acupuncture points.'},
    {en:'Qi (energy flow)',zh:'气（能量流动）',ex:'Acupuncture restores the balance of Qi.'},
    {en:'hair-thin needle',zh:'发丝细的针',ex:'The needles are hair-thin.'},
    {en:'sterile',zh:'无菌的',ex:'All needles are sterile and disposable.'},
    {en:'disposable',zh:'一次性的',ex:'We use disposable needles every time.'},
    {en:'stimulate',zh:'刺激',ex:'The needles stimulate specific points.'},
    {en:'nervous system',zh:'神经系统',ex:'It signals the nervous system.'},
    {en:'endorphin',zh:'内啡肽',ex:'It triggers the release of endorphins.'},
    {en:'de qi sensation',zh:'得气感',ex:'You may feel a de qi sensation.'},
    {en:'tingling',zh:'刺痛/麻麻的感觉',ex:'Some people feel tingling.'},
    {en:'heaviness',zh:'沉重感',ex:'Others describe a heaviness.'},
    {en:'warmth',zh:'温热感',ex:'You might feel warmth around the needle.'},
    {en:'circulation',zh:'血液循环',ex:'It promotes blood circulation.'},
    {en:'inflammation',zh:'炎症',ex:'It can help reduce inflammation.'},
    {en:'side effect',zh:'副作用',ex:'Side effects are very rare.'},

    {en:'treatment course',zh:'疗程',ex:'A full treatment course is 6-8 sessions.'},
    {en:'frequency',zh:'频率',ex:'We recommend twice a week at first.'},
    {en:'evidence-based',zh:'有科学依据的',ex:'Acupuncture is evidence-based.'},
    {en:'safe',zh:'安全的',ex:'It\'s completely safe when done properly.'},
    {en:'effective',zh:'有效的',ex:'Many patients find it very effective.'},
    {en:'anxiety',zh:'焦虑',ex:'It can help reduce anxiety.'},
    {en:'pain relief',zh:'止痛',ex:'Many seek it for pain relief.'},

  dialogues:[
    {title:'对话一：担心疼痛的游客',lines:[
      {r:'you',en:'Before we start, do you have any questions about the treatment?',zh:'开始之前，您对治疗有任何问题吗？'},
      {r:'them',en:'Yes — will it hurt? I\'m honestly terrified of needles.',zh:'有——会疼吗？说实话我非常怕针。'},
      {r:'you',en:'That\'s the number one concern people have! The good news is, these needles are nothing like injection needles. They\'re hair-thin — about the diameter of a strand of your hair.',zh:'这是大家最常见的顾虑！好消息是，这些针和注射针完全不同。它们细如发丝——大概和您头发的直径差不多。'},
      {r:'them',en:'Really? So it doesn\'t hurt at all?',zh:'真的吗？所以完全不疼？'},
      {r:'you',en:'Most people feel very little or nothing. You might feel a slight pressure or what we call "de qi" — a mild tingling or heaviness. That\'s actually a good sign — it means the point is activated.',zh:'大多数人感觉很轻微或什么都感觉不到。您可能会感到轻微的压力，或我们称之为"得气"的感觉——一种轻微的刺痛或沉重感。这实际上是个好迹象——说明穴位被激活了。'},
      {r:'them',en:'Okay… and what if I can\'t handle it and want you to stop?',zh:'好的……如果我受不了，想让您停下来怎么办？'},
      {r:'you',en:'Absolutely no problem. You are in control at all times. Just say "stop" and I\'ll remove the needles immediately. There\'s no pressure here.',zh:'完全没问题。您随时都有控制权。只需说"停"，我会立刻取出针。这里没有任何压力。'},
      {r:'them',en:'That makes me feel a lot better. Thank you.',zh:'这让我感觉好多了。谢谢您。'},
    ]},
    {title:'对话二：问科学原理的游客',lines:[
      {r:'them',en:'I\'m a bit skeptical, to be honest. Is there actual science behind acupuncture?',zh:'说实话，我有点怀疑。针灸有真正的科学依据吗？'},
      {r:'you',en:'That\'s a fair question. There is a growing body of scientific research supporting acupuncture. Studies show it stimulates the nervous system and triggers the release of natural painkillers called endorphins.',zh:'这是个好问题。越来越多的科学研究支持针灸。研究表明针灸刺激神经系统，并触发释放称为内啡肽的天然止痛物质。'},
      {r:'them',en:'So it\'s not just a placebo effect?',zh:'所以这不只是安慰剂效应？'},
      {r:'you',en:'The evidence suggests it goes beyond placebo. The World Health Organization recognizes acupuncture as effective for over 100 conditions, including chronic pain, headaches, and anxiety.',zh:'证据表明它超出了安慰剂效应。世界卫生组织承认针灸对100多种疾病有效，包括慢性疼痛、头痛和焦虑。'},
      {r:'them',en:'That\'s actually more than I expected. What about the traditional Chinese explanation — meridians and Qi?',zh:'这比我预期的要多。那中医的解释——经络和气——呢？'},
      {r:'you',en:'Traditional Chinese medicine explains it in terms of Qi flowing along meridians — energy pathways in the body. Modern science maps these to nerve pathways and connective tissue. Both frameworks lead to the same result.',zh:'中医用气沿经络——身体内的能量通道——流动来解释。现代科学将其对应到神经通路和结缔组织。两种框架得出同样的结果。'},
      {r:'them',en:'Interesting. I\'ll keep an open mind and give it a try.',zh:'有意思。我会保持开放的心态，试一试。'},
    ]},
    {title:'对话三：问疗效和疗程的游客',lines:[
      {r:'them',en:'How quickly will I see results? I\'m only on this cruise for another four days.',zh:'我多快会看到效果？我在这艘游轮上只剩四天了。'},
      {r:'you',en:'Many people notice improvement after just one or two sessions, especially for acute issues like tension or stress. For chronic conditions, it usually takes a few more sessions.',zh:'很多人仅仅一两次疗程后就注意到改善，尤其是对于紧张或压力等急性问题。对于慢性疾病，通常需要更多疗程。'},
      {r:'them',en:'So I might actually feel better before the cruise ends?',zh:'所以我可能在游轮行程结束前就会感觉好些了？'},
      {r:'you',en:'Absolutely — especially for your shoulder tension. I\'d recommend two or three sessions over the next four days to really maximize the benefit.',zh:'当然——尤其是对于您的肩膀紧张。我建议在接下来的四天内进行两到三次疗程，以真正最大化效果。'},
      {r:'them',en:'Are there any side effects I should know about?',zh:'有什么我应该了解的副作用吗？'},
      {r:'you',en:'Side effects are very mild and rare. Some people experience slight soreness or a small bruise at the needle site, which fades within a day or two. You may also feel deeply relaxed or a little tired afterwards — that\'s your body healing.',zh:'副作用非常轻微且罕见。有些人会在针孔处感到轻微酸痛或出现小瘀伤，会在一两天内消退。您之后也可能感到深度放松或有点疲倦——那是您的身体在愈合。'},
    ]},
  ]
},
{
  num:'04', title:'治疗过程中', titleEn:'During Treatment', desc:'指引动作、询问感受、安抚情绪',
  aiRoleZh:'正躺在治疗床上的乘客',
  systemPrompt:`You are an English-speaking cruise passenger lying on the acupuncture table receiving treatment. You experience various sensations and have questions or comments. Respond in TWO sections separated ONLY by "---SPLIT---":
Section 1: Stay in character. React to the acupuncturist's instructions or ask questions (1-3 sentences).
Section 2: JSON — if errors: {"ok":false,"original":"phrase","corrected":"better","tip":"中文说明"} — if fine: {"ok":true,"msg":"鼓励"}`,
  vocab:[
    {en:'lie face down',zh:'俯卧/趴下',ex:'Please lie face down on the table.'},
    {en:'lie face up',zh:'仰卧/躺下',ex:'Now lie face up, please.'},
    {en:'face cradle',zh:'面部托架',ex:'Rest your face in the face cradle.'},
    {en:'prone position',zh:'俯卧位',ex:'Stay in the prone position.'},
    {en:'supine position',zh:'仰卧位',ex:'I\'ll put you in the supine position now.'},
    {en:'drape',zh:'盖布/遮盖',ex:'I\'ll drape this sheet over you.'},
    {en:'insert',zh:'插入',ex:'I\'m going to insert the needle now.'},
    {en:'retain',zh:'留置',ex:'I\'ll retain the needles for 20 minutes.'},
    {en:'remove',zh:'取出',ex:'I\'m removing the needle now.'},
    {en:'de qi',zh:'得气',ex:'That sensation is called de qi.'},
    {en:'tingling',zh:'刺痛/麻感',ex:'Do you feel any tingling?'},
    {en:'heaviness',zh:'沉重感',ex:'Some people feel heaviness.'},
    {en:'twitch response',zh:'肌肉抽动反应',ex:'The twitch response is normal.'},
    {en:'muscle spasm',zh:'肌肉痉挛',ex:'You may feel a brief muscle spasm.'},
    {en:'discomfort',zh:'不适',ex:'Tell me if you feel any discomfort.'},
    {en:'sharp pain',zh:'刺痛',ex:'Sharp pain is not normal.'},
    {en:'tolerable',zh:'可以忍受的',ex:'Is the sensation tolerable?'},
    {en:'breathe deeply',zh:'深呼吸',ex:'Breathe deeply and slowly.'},
    {en:'stay still',zh:'保持不动',ex:'Try to stay as still as possible.'},
    {en:'relax your muscles',zh:'放松肌肉',ex:'Try to relax the muscles in your back.'},
    {en:'peaceful',zh:'平静的',ex:'Just focus on breathing and stay peaceful.'},
    {en:'timer',zh:'计时器',ex:'I\'ll set a timer for 20 minutes.'},
    {en:'call out',zh:'出声叫我',ex:'Just call out if you need me.'},
    {en:'dim the lights',zh:'调暗灯光',ex:'I\'ll dim the lights for you.'},
    {en:'blanket',zh:'毯子',ex:'Would you like a blanket?'},
  ],
  dialogues:[
    {title:'对话一：第一次、有点紧张的患者',lines:[
      {r:'you',en:'Alright, please lie face down on the table and rest your face in the cradle. Make yourself comfortable.',zh:'好的，请俯卧在治疗床上，把脸放在面部托架里。让自己舒服。'},
      {r:'them',en:'Like this? Is the sheet supposed to cover me?',zh:'像这样吗？床单应该盖住我吗？'},
      {r:'you',en:'Perfect position. I\'ll drape the sheet over your lower half for comfort and privacy. Just take a slow, deep breath and try to relax your muscles.',zh:'位置很好。我会把床单盖在您的下半身，以保持舒适和隐私。慢慢深呼吸，试着放松肌肉。'},
      {r:'them',en:'Okay… I\'m trying. I\'m a bit tense, I think.',zh:'好的……我在尝试。我觉得我有点紧张。'},
      {r:'you',en:'That\'s completely normal for the first time. I\'m going to place the first needle now — just breathe out slowly as I do. Ready?',zh:'第一次这样完全正常。我现在要放入第一根针——我放的时候慢慢呼出。准备好了吗？'},
      {r:'them',en:'Okay… oh! I felt something. Like a dull ache.',zh:'好的……哦！我感到了什么。像一种隐痛。'},
      {r:'you',en:'That\'s exactly what we want — that\'s the de qi sensation. It means the needle is in the right point. The feeling usually fades within a few seconds.',zh:'这正是我们想要的——这就是得气感。说明针刺到了正确的穴位。这种感觉通常在几秒内消退。'},
      {r:'them',en:'Oh wow, it\'s actually fading already. That\'s not bad at all.',zh:'哇，它真的已经在消退了。这还好嘛。'},
      {r:'you',en:'I\'ll set a timer for 20 minutes. The lights will be dimmed. Just rest and breathe. I\'ll check on you in a few minutes. Call out if you need anything.',zh:'我会设置20分钟的计时器。灯光会调暗。只需休息和呼吸。我会几分钟后来看您。如果需要什么就出声叫我。'},
    ]},
    {title:'对话二：治疗中问问题的患者',lines:[
      {r:'them',en:'How many needles are you putting in? I\'m trying to count but I can\'t feel most of them.',zh:'您放了多少根针？我在试着数，但大多数我感觉不到。'},
      {r:'you',en:'I\'ve put in 12 so far, mainly along your upper back and shoulders. I\'ll add three more along your neck.',zh:'到目前为止我放了12根，主要在您的上背部和肩膀。我还会在颈部再加三根。'},
      {r:'them',en:'My left shoulder feels really heavy right now. Is that normal?',zh:'我左肩现在感觉非常沉重。这正常吗？'},
      {r:'you',en:'Yes, heaviness is one of the classic de qi sensations — it actually means your muscles are releasing tension. That\'s a great sign.',zh:'是的，沉重感是经典得气感之一——这实际上意味着您的肌肉正在释放紧张。这是个好迹象。'},
      {r:'them',en:'I also feel kind of warm around the needle in my lower back.',zh:'我下背部的针周围也感到有点温热。'},
      {r:'you',en:'Warmth is another positive response — it indicates increased blood circulation in that area. Just relax into those sensations. They\'re all working for you.',zh:'温热感是另一个积极反应——说明该区域血液循环增加了。只需放松感受这些感觉。它们都在为您发挥作用。'},
    ]},
    {title:'对话三：治疗中感到不适的患者',lines:[
      {r:'them',en:'Excuse me… one of the needles on my right leg feels really sharp. Not like the others.',zh:'打扰一下……我右腿上的一根针感觉非常刺痛。和其他的不一样。'},
      {r:'you',en:'Thank you for telling me right away. I\'ll adjust it immediately. Sharp, stinging pain is not what we want.',zh:'谢谢您立刻告诉我。我马上调整。刺痛感不是我们想要的。'},
      {r:'them',en:'Oh, that\'s much better now. What happened?',zh:'哦，现在好多了。是怎么了？'},
      {r:'you',en:'The needle was very slightly off-angle. That can occasionally happen. I\'ve repositioned it and everything looks good now. How does it feel?',zh:'针的角度稍微偏了一点。这偶尔会发生。我已经重新调整了，现在一切看起来很好。感觉怎么样？'},
      {r:'them',en:'Much better. Just the dull heaviness like the other ones.',zh:'好多了。只是像其他的一样有沉重感。'},
      {r:'you',en:'Perfect. Please always tell me immediately if anything feels sharp or burning — it\'s important and I can always make an adjustment.',zh:'很好。如果有任何刺痛或灼热感，请立刻告诉我——这很重要，我随时可以做调整。'},
    ]},
  ]
},

    {en:'realistic expectation',zh:'现实的预期',ex:'Let\'s set some realistic expectations.'},
    {en:'maintenance session',zh:'维护疗程',ex:'Monthly maintenance sessions help.'},
    {en:'improvement',zh:'改善',ex:'Most patients see steady improvement.'},
    {en:'progress',zh:'进展',ex:'We\'ll track your progress.'},
    {en:'long-term',zh:'长期的',ex:'For long-term results, be consistent.'},
    {en:'spicy food',zh:'辛辣食物',ex:'Avoid spicy food today.'},
    {en:'take it easy',zh:'放轻松/不要过度活动',ex:'Take it easy for the rest of the day.'},
    {en:'drink plenty of water',zh:'多喝水',ex:'Please drink plenty of water today.'},
    {en:'notice changes',zh:'注意变化',ex:'Notice any changes in your symptoms.'},
    {en:'reach out',zh:'联系我',ex:'Reach out if you have any concerns.'},
  ],
  dialogues:[
    {title:'对话一：第一次治疗后',lines:[
      {r:'you',en:'How are you feeling? Take your time sitting up — don\'t rush.',zh:'您感觉怎么样？慢慢坐起来——不要着急。'},
      {r:'them',en:'Wow, I feel incredibly relaxed. Almost a little floaty. Is that normal?',zh:'哇，我感觉非常放松。几乎有点飘飘然。这正常吗？'},
      {r:'you',en:'Very normal — some people describe it as a "treatment high." Your nervous system has just had a deep reset. Enjoy it!',zh:'非常正常——有些人把它描述为"治疗后的愉悦感"。您的神经系统刚刚经历了深度重置。享受吧！'},
      {r:'them',en:'I also feel a bit tired. Should I be worried?',zh:'我也感到有点疲倦。我应该担心吗？'},
      {r:'you',en:'Not at all. Fatigue after the first session is very common — it means your body is healing. I\'d actually suggest taking it easy for the rest of the day.',zh:'完全不用。第一次疗程后的疲倦非常常见——说明您的身体正在愈合。我实际上建议您今天剩下的时间放轻松。'},
      {r:'them',en:'Good to know. Is there anything I absolutely shouldn\'t do today?',zh:'很好知道。今天有什么我绝对不应该做的吗？'},
      {r:'you',en:'Please drink plenty of water throughout the day. Also, avoid alcohol and strenuous exercise for 24 hours, and skip the sauna or hot tub if you can.',zh:'请全天多喝水。同时在24小时内避免饮酒和剧烈运动，如果可以的话也避免桑拿或热水浴。'},
      {r:'them',en:'Oh, we have a wine tasting tonight! Can I skip the alcohol advice just this once?',zh:'哦，我们今晚有品酒活动！我可以就这一次不听酒精的建议吗？'},
      {r:'you',en:'I understand! You can have a little wine, but try to keep it to one glass and drink extra water alongside it. Your body will thank you tomorrow.',zh:'我理解！您可以喝一点葡萄酒，但尽量只喝一杯，同时喝更多水。明天您的身体会感谢您的。'},
    ]},
    {title:'对话二：有瘀青/酸痛的患者',lines:[
      {r:'them',en:'I noticed a tiny bruise near one of the needle sites this morning. Is something wrong?',zh:'我今天早上注意到一个针孔附近有个小瘀伤。是有什么问题吗？'},
      {r:'you',en:'Please don\'t worry — that\'s a completely normal and common reaction. It just means a tiny capillary was near the needle site. It will fade within a day or two.',zh:'请不要担心——这是完全正常且常见的反应。只是意味着针孔附近有一个小毛细血管。它会在一两天内消退。'},
      {r:'them',en:'I\'m also a bit sore in the spots where you put the needles. Like a mild ache.',zh:'我在您放针的地方也有点酸痛。像一种轻微的疼痛。'},
      {r:'you',en:'That\'s also perfectly normal — it\'s called a healing response. Your muscles are processing the treatment. It should ease up within 24 hours.',zh:'这也是完全正常的——被称为愈合反应。您的肌肉正在处理治疗效果。应该在24小时内缓解。'},
      {r:'them',en:'Should I put heat on it or ice on it?',zh:'我应该热敷还是冰敷？'},
      {r:'you',en:'I\'d actually recommend neither for now. Just let your body do its work. If the soreness is still significant after 48 hours, you can apply gentle warmth then.',zh:'我实际上建议现在两者都不要用。只需让您的身体自行运作。如果48小时后酸痛仍然明显，那时可以轻柔地温热敷。'},
    ]},
    {title:'对话三：询问疗效时间的患者',lines:[
      {r:'them',en:'I came in for my back pain. I don\'t really feel much different yet. Should I be concerned?',zh:'我来是为了背痛。我感觉还没什么不同。我应该担心吗？'},
      {r:'you',en:'That\'s completely understandable, and it\'s actually very common after the first session. Acupuncture works cumulatively — the benefits build up over multiple sessions.',zh:'这完全可以理解，第一次疗程后这实际上非常常见。针灸效果是累积的——效益随多次疗程逐渐积累。'},
      {r:'them',en:'So how many sessions before I might notice a difference?',zh:'那我大概需要几次疗程才能注意到改变？'},
      {r:'you',en:'Most patients with chronic back pain start noticing real improvement by the third or fourth session. Some notice it sooner. I\'d like to set a realistic goal of three sessions and then reassess.',zh:'大多数慢性背痛患者在第三或第四次疗程时开始注意到真正的改善。有些人更快。我想设定三次疗程的现实目标，然后重新评估。'},
      {r:'them',en:'That\'s fair. Is there anything I can do between sessions to help?',zh:'这很合理。两次疗程之间我能做什么来帮助效果吗？'},
      {r:'you',en:'Yes — stay hydrated, avoid cold food and drinks, try to reduce stress, and do some gentle stretching. Also, notice any changes in your symptoms, even small ones, and tell me at your next visit.',zh:'可以——保持水分，避免寒凉食物和饮品，尽量减少压力，做一些轻柔的伸展运动。另外，注意症状的任何变化，即使是小的变化，在下次就诊时告诉我。'},
    ]},
  ]
},

  dialogues:[
    {title:'对话一：询问价格和套餐',lines:[
      {r:'you',en:'I\'m glad the session was helpful! Would you like to book a follow-up before you go?',zh:'很高兴疗程有帮助！您离开前想预约下次吗？'},
      {r:'them',en:'Yes, I think so. Can you tell me about the pricing first?',zh:'是的，我想。能先告诉我价格吗？'},
      {r:'you',en:'Of course. A single session is $90. We also have a package of three sessions for $240, which saves you $30. And a five-session package for $375 — saving $75.',zh:'当然。单次疗程是90美元。我们也有三次疗程套餐，240美元，能省30美元。还有五次疗程套餐，375美元——能省75美元。'},
      {r:'them',en:'Hmm. How many days do we have left on the cruise?',zh:'嗯。游轮还有几天行程？'},
      {r:'you',en:'You have four days left, so the three-session package would fit perfectly — one session every other day.',zh:'您还有四天，所以三次疗程套餐非常合适——每隔一天一次。'},
      {r:'them',en:'That sounds good actually. Can I charge it to my room?',zh:'这听起来不错。可以记到我的房间账单吗？'},
      {r:'you',en:'Absolutely. I just need your sea pass card. I\'ll also print a receipt for your records.',zh:'当然可以。我只需要您的游轮通行卡。我也会打印一张收据供您保存。'},
      {r:'them',en:'Perfect. Can I do my next one tomorrow morning?',zh:'很好。我能明天早上来做下一次吗？'},
      {r:'you',en:'Let me check… yes, I have 10:00 am and 11:30 am available. Which works better for you?',zh:'让我查一下……是的，我有上午10点和11点半的空档。哪个对您更方便？'},
    ]},
    {title:'对话二：需要改约的患者',lines:[
      {r:'them',en:'Hi, I have an appointment tomorrow at 2 pm, but our shore excursion got extended. Can I change it?',zh:'嗨，我明天下午2点有预约，但我们的岸上游览延长了。我能改约吗？'},
      {r:'you',en:'Of course — thank you for letting us know ahead of time. When would work better for you?',zh:'当然可以——感谢您提前通知我们。什么时间对您更方便？'},
      {r:'them',en:'Could we do tomorrow evening instead? Maybe around 5 or 6?',zh:'我们能改到明天晚上吗？也许5点或6点左右？'},
      {r:'you',en:'I have 5:30 pm available tomorrow. Shall I put you down for that?',zh:'我明天下午5点半有空档。要帮您预约那个时间吗？'},
      {r:'them',en:'Yes please. Is there a fee for changing the appointment?',zh:'好的，麻烦了。改约有费用吗？'},
      {r:'you',en:'No fee at all when you give us more than 24 hours notice — which you did. We only charge for no-shows or very last-minute cancellations.',zh:'提前超过24小时通知我们的话完全免费——您做到了。我们只对爽约或非常临时的取消收费。'},

      {r:'you',en:'That\'s a fair concern. Can I ask — how did your shoulder feel after yesterday\'s session compared to before?',zh:'这是个合理的顾虑。我能问一下——与之前相比，昨天疗程后您的肩膀感觉怎么样？'},
      {r:'them',en:'Actually… noticeably better. I could lift my arm higher this morning without as much pain.',zh:'实际上……明显好多了。今天早上我能把手臂抬得更高，疼痛也少多了。'},
      {r:'you',en:'That\'s real progress after just one session. The effects are cumulative — a second and third session will build significantly on that improvement.',zh:'这是仅仅一次疗程后的真实进步。效果是累积的——第二次和第三次疗程将在这个改善基础上大幅提升。'},
      {r:'them',en:'You make a good point. I\'ll go ahead and do the three-session package then.',zh:'您说得有道理。那我就买三次疗程套餐吧。'},

  dialogues:[
    {title:'对话一：谈下一个停靠港',lines:[
      {r:'you',en:'Hey! Are you going ashore when we dock in Santorini tomorrow?',zh:'嘿！我们明天停靠圣托里尼的时候你要上岸吗？'},
      {r:'them',en:'Try and stop me! I\'ve been counting down for two weeks. Have you been before?',zh:'想拦都拦不住！我已经倒数了两周了。你去过吗？'},
      {r:'you',en:'Yes, once. The views are incredible. How much shore leave do you have?',zh:'去过，一次。那里的景色令人叹为观止。你有多少上岸假期？'},
      {r:'them',en:'Only five hours, which is never enough. But better than nothing! Any tips?',zh:'只有五小时，永远不够用。但总比没有好！有什么建议吗？'},
      {r:'you',en:'Skip the main tourist area in the morning — too crowded. Take the cable car up to Oia and walk along the caldera path.',zh:'早上不要去主要旅游区——太拥挤了。坐缆车到伊亚，沿着火山口小路走走。'},
      {r:'them',en:'Ooh, good shout. Want to go together? We could grab a coffee with a view.',zh:'哦，好建议。想一起去吗？我们可以找个有景色的地方喝杯咖啡。'},
      {r:'you',en:'I\'d love that! What time does your shift end?',zh:'我很乐意！你什么时候下班？'},
      {r:'them',en:'I\'m off at 9 am. Meet at the gangway at quarter past?',zh:'我9点下班。9点15分在舷梯那见？'},
    ]},
    {title:'对话二：聊合同和思家',lines:[
      {r:'them',en:'You look tired today. Everything alright?',zh:'你今天看起来很疲惫。一切都好吗？'},
      {r:'you',en:'I\'m okay. Just missing home a bit. My sister had a baby last week and I couldn\'t be there.',zh:'我还好。只是有点想家。我妹妹上周生了宝宝，我没能在场。'},
      {r:'them',en:'Oh no, that\'s really tough. I\'m sorry. How much longer is your contract?',zh:'哦不，这真的很难受。我很遗憾。你的合同还有多久？'},
      {r:'you',en:'Three more months. Then I\'m going home for six weeks before the next contract.',zh:'还有三个月。然后我要回家休六周再开始下一份合同。'},
      {r:'them',en:'I\'ve got two months left myself. Honestly, I don\'t know how you do it. This is only my first contract.',zh:'我自己还有两个月。说实话，我不知道你是怎么做到的。这只是我的第一份合同。'},
      {r:'you',en:'It gets easier, I promise. The first contract is always the hardest. You start to find your sea legs and make real friends.',zh:'我保证会越来越容易的。第一份合同总是最难的。你会开始适应海上生活，结交真正的朋友。'},
      {r:'them',en:'That\'s actually quite reassuring. What do you do when you\'re feeling homesick?',zh:'这确实让人宽慰。当你想家的时候你怎么做？'},
      {r:'you',en:'Video calls help a lot. And honestly, keeping busy is the best cure. When I\'m focused on my work, I forget to be sad.',zh:'视频通话帮了很大忙。说实话，保持忙碌是最好的良药。当我专注于工作时，我就忘了悲伤。'},
    ]},
    {title:'对话三：轻松闲聊搞笑经历',lines:[
      {r:'them',en:'You will not believe what happened to me today. A guest actually asked me if the ship stops at night.',zh:'你不会相信今天发生在我身上的事。一位客人真的问我船晚上停不停驶。'},
      {r:'you',en:'Ha! Classic. Did you manage to keep a straight face?',zh:'哈！经典。你忍住没笑出来吗？'},
      {r:'them',en:'Barely! I said "no sir, we keep going" as seriously as I could. What about you — any interesting characters this week?',zh:'勉强！我尽量严肃地说"不，先生，我们继续行驶"。你呢——这周有什么有趣的人吗？'},
      {r:'you',en:'Yes! A guest yesterday asked if the needles would affect their Wi-Fi signal.',zh:'有！昨天一位客人问针灸会不会影响他们的Wi-Fi信号。'},
      {r:'them',en:'Oh my goodness, that\'s brilliant. What did you even say?',zh:'天哪，这太绝了。你说了什么？'},
      {r:'you',en:'I told him the needles improve the flow of Qi, not data, but his internet might feel faster if he\'s more relaxed.',zh:'我告诉他针灸改善的是气的流动，不是数据，但如果他更放松了，网络可能会感觉快一些。'},
      {r:'them',en:'That\'s the perfect answer! You should write a book about this job.',zh:'这是完美的回答！你应该写一本关于这份工作的书。'},
    ]},

    {en:'emergency number',zh:'紧急电话',ex:'I\'m calling the emergency number.'},
  ],
  dialogues:[
    {title:'对话一：治疗中晕针',lines:[
      {r:'them',en:'Excuse me… I\'m sorry, I feel really dizzy all of a sudden. And a bit nauseous.',zh:'打扰一下……对不起，我突然感到非常头晕。还有点恶心。'},

      {r:'you',en:'Good. I\'m going to check your pulse and get you some cold water. Please don\'t sit up yet — just lie still for a few minutes.',zh:'很好。我要检查一下您的脉搏，给您拿点冷水。请先不要坐起来——先安静躺几分钟。'},

      {r:'them',en:'I\'m sorry but I can\'t do this. I need you to take the needles out right now. I\'m panicking.',zh:'对不起，我做不到。我需要您现在就取出针。我在恐慌。'},

      {r:'you',en:'Please don\'t feel bad at all. This happens, and it\'s absolutely okay. Your comfort and safety always come first. All the needles are out now — how do you feel?',zh:'请完全不要有这种感觉。这会发生，这完全没问题。您的舒适和安全始终是第一位的。现在针都取出来了——您感觉怎么样？'},

      {r:'you',en:'I really appreciate you being honest with me. I\'m sorry the progress hasn\'t been as clear as we\'d hoped. Let\'s talk — can you tell me more specifically what you\'re feeling?',zh:'我非常感谢您对我坦诚。我很遗憾进展不像我们希望的那样明显。我们来谈谈——您能更具体地告诉我您的感受吗？'},
      {r:'them',en:'It hurts just as much as before. If anything, maybe slightly less in the morning, but overall not much difference.',zh:'疼痛和之前一样。如果说有的话，早上可能稍微轻一点，但总体上没什么太大区别。'},
      {r:'you',en:'That\'s actually meaningful progress — less morning pain is a real improvement. But I hear you — you were hoping for more. Let me reassess your treatment points today and try a slightly different approach.',zh:'这实际上是有意义的进步——晨起疼痛减轻是真正的改善。但我听到您了——您希望有更多改善。让我今天重新评估您的治疗穴位，尝试稍微不同的方法。'},
      {r:'them',en:'Okay, I\'m willing to try one more time. But if I don\'t see more improvement, I\'d like a partial refund.',zh:'好的，我愿意再试一次。但如果我没看到更多改善，我希望得到部分退款。'},
      {r:'you',en:'That\'s a completely reasonable request. Let\'s give this session everything we have, and if you\'re still not satisfied afterwards, I\'ll speak with my manager about options for you.',zh:'这是完全合理的要求。让我们在这次疗程中全力以赴，如果之后您仍然不满意，我会和我的经理谈谈您的选择。'},
    ]},

];

let curSc = null, curTab = 'fc';
let fcCards = [], fcIdx = 0, fcFlipped = false;
let chatHistory = [];

function getNB() { try { return JSON.parse(localStorage.getItem('errorWords') || '{}'); } catch(e){ return {}; } }
function saveNB(nb) { localStorage.setItem('errorWords', JSON.stringify(nb)); }
function addToNB(scIdx, vocabIdx) {
  const nb = getNB();
  const key = scIdx + '_' + vocabIdx;
  if (!nb[key]) { nb[key] = { scIdx, vocabIdx }; saveNB(nb); }
}
function removeFromNB(scIdx, vocabIdx) {
  const nb = getNB();
  delete nb[scIdx + '_' + vocabIdx];
  saveNB(nb);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const doSpeak = () => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.88;
    window.speechSynthesis.speak(u);
  };
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) {
    window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true });
  } else {
    doSpeak();
  }
}

function renderHome() {
  document.getElementById('homeGrid').innerHTML = SCENARIOS.map((s,i) =>
    `<div class="sc-card" onclick="openSc(${i})">
      <div class="sc-num">场景 ${s.num}</div>
      <div class="sc-title">${s.title}</div>
      <div class="sc-en">${s.titleEn}</div>
      <div class="sc-desc">${s.desc}</div>
    </div>`
  ).join('');
}

function openSc(i) {
  curSc = i;
  const s = SCENARIOS[i];
  show('scScr');
  document.getElementById('backBtn').classList.add('on');
  document.getElementById('hTitle').textContent = `${s.num}. ${s.title}`;
  document.getElementById('scTitle').textContent = `${s.title}  ·  ${s.titleEn}`;
  document.getElementById('scDesc').textContent = s.desc;
  renderFC(i);
  renderDlg(i);
  resetChat(i);
  switchTab('fc');
}

function goHome() {
  show('homeScr');
  document.getElementById('backBtn').classList.remove('on');
  document.getElementById('hTitle').textContent = '🌊 游轮英语口语练习';
}

function openNB() {
  show('nbScr');
  document.getElementById('backBtn').classList.add('on');
  document.getElementById('hTitle').textContent = '📒 错词本';
  renderNBScreen();
}

function show(id) {
  ['homeScr','scScr','nbScr'].forEach(s => {
    document.getElementById(s).classList.toggle('on', s === id);
  });
}

function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('on', p.id === 'panel-' + tab));
}

/* FLASHCARD */
function renderFC(i) {
  const s = SCENARIOS[i];
  fcCards = s.vocab.map((v, vi) => ({ ...v, vi }));
  fcCards = fcCards.sort(() => Math.random() - 0.5);
  fcIdx = 0; fcFlipped = false;
  drawFC();
}

function drawFC() {
  const panel = document.getElementById('panel-fc');
  const total = fcCards.length;
  if (fcIdx >= total) {
    const nb = getNB();
    const wrongCount = Object.keys(nb).filter(k => k.startsWith(curSc + '_')).length;
    panel.innerHTML = `<div class="fc-progress"><div class="fc-prog-bar" style="width:100%"></div></div>
      <div class="fc-done">
        <h3>🎉 本场景词汇完成！</h3>
        <p style="margin-bottom:1rem">${wrongCount > 0 ? `共 ${wrongCount} 个词已加入错词本，可继续复习。` : '表现很棒，没有错词！'}</p>
        <button class="fc-restart" onclick="renderFC(${curSc})">重新练习</button>
        <button class="fc-nb-btn" onclick="openNB()">查看错词本</button>
      </div>`;
    return;
  }
  const card = fcCards[fcIdx];
  const pct = Math.round((fcIdx / total) * 100);
  panel.innerHTML = `
    <div class="fc-meta">
      <span>${fcIdx + 1} / ${total}</span>
      <span style="font-size:12px;color:#aaa">点击卡片翻转</span>
    </div>
    <div class="fc-progress"><div class="fc-prog-bar" style="width:${pct}%"></div></div>
    <div class="fc-wrap">
      <div class="fc-inner" id="fcInner" onclick="flipFC()">
        <div class="fc-face fc-front">
          <div class="fc-word">${card.en}</div>
          <div class="fc-hint">点击查看中文意思</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-zh">${card.zh}</div>
          <div class="fc-ex">"${card.ex}"</div>
          <button class="fc-tts" onclick="event.stopPropagation();speak('${card.en.replace(/'/g,"\\'")}')">🔊 朗读</button>
        </div>
      </div>
    </div>
    <div class="fc-btns" id="fcBtns" style="display:none">
      <button class="fc-wrong" onclick="markFC(false)">✗ 不认识</button>
      <button class="fc-right" onclick="markFC(true)">✓ 认识了</button>
    </div>`;
  fcFlipped = false;
}

function flipFC() {
  const inner = document.getElementById('fcInner');
  const btns = document.getElementById('fcBtns');
  if (!fcFlipped) {
    inner.classList.add('flipped');
    btns.style.display = 'flex';
    fcFlipped = true;
  }
}

function markFC(correct) {
  if (!correct) addToNB(curSc, fcCards[fcIdx].vi);
  fcIdx++;
  drawFC();
}

/* DIALOGUE */
function renderDlg(i) {
  const s = SCENARIOS[i];
  const panel = document.getElementById('panel-dlg');
  let selHTML = s.dialogues.map((d, di) =>
    `<button class="dlg-opt${di===0?' on':''}" onclick="showDlg(${i},${di})">${d.title}</button>`
  ).join('');
  panel.innerHTML = `<div class="dlg-sel">${selHTML}</div><div id="dlgLines"></div>`;
  showDlg(i, 0);
}

function showDlg(si, di) {
  const s = SCENARIOS[si];
  document.querySelectorAll('.dlg-opt').forEach((b, i) => b.classList.toggle('on', i === di));
  const d = s.dialogues[di];
  document.getElementById('dlgLines').innerHTML = `<div class="dlg-list">${d.lines.map(l =>
    `<div class="dlg-line">
      <div class="dlg-role ${l.r}">${l.r === 'you' ? '🟢 你（针灸师）' : '🔵 对方（乘客/船员）'}</div>
      <div class="dlg-en">${l.en}</div>
      <div class="dlg-zh">${l.zh}</div>
      <button class="dlg-tts" onclick="speak('${l.en.replace(/'/g,"\\'")}')">🔊 朗读</button>
    </div>`
  ).join('')}</div>`;
}

/* CHAT */
function resetChat(i) {
  chatHistory = [];
  const s = SCENARIOS[i];
  const msgs = document.getElementById('chatMsgs');
  msgs.innerHTML = '';
  document.getElementById('chatRoleInfo').innerHTML = `AI正在扮演：<strong>${s.aiRoleZh}</strong>。请你扮演针灸师，用英语开始对话。AI会纠正你的英语错误。`;
  addSysMsg('场景开始！请用英语开口，AI 会回复并帮你纠错。');
}

function addSysMsg(t) {
  const d = document.createElement('div');
  d.className = 'msg-sys'; d.textContent = t;
  document.getElementById('chatMsgs').appendChild(d);
  scrollChat();
}

function addUserMsg(t) {
  const d = document.createElement('div');
  d.className = 'msg-user'; d.textContent = t;
  document.getElementById('chatMsgs').appendChild(d);
  scrollChat();
}

function addAIMsg(reply, correction) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-ai-wrap';
  const bubble = document.createElement('div');
  bubble.className = 'msg-ai';
  bubble.textContent = reply;
  wrap.appendChild(bubble);
  const ttsBtn = document.createElement('button');
  ttsBtn.className = 'ai-tts';
  ttsBtn.textContent = '🔊 朗读回复';
  ttsBtn.onclick = () => speak(reply);
  wrap.appendChild(ttsBtn);
  if (correction) {
    const box = document.createElement('div');
    if (correction.ok) {
      box.className = 'correction ok';
      box.innerHTML = `<div class="label">✅ 表达检查</div>${correction.msg}`;
    } else {
      box.className = 'correction err';
      box.innerHTML = `<div class="label">📝 纠错建议</div>
        <div class="orig">❌ "${correction.original}"</div>
        <div class="fix">✅ "${correction.corrected}"</div>
        <div class="tip">💡 ${correction.tip}</div>`;
    }
    wrap.appendChild(box);
  }
  document.getElementById('chatMsgs').appendChild(wrap);
  scrollChat();
}

function scrollChat() {
  const el = document.getElementById('chatMsgs');
  el.scrollTop = el.scrollHeight;
}

async function sendChat() {
  const inp = document.getElementById('chatIn');
  const text = inp.value.trim();
  if (!text || curSc === null) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  inp.value = ''; autoH(inp);
  addUserMsg(text);
  chatHistory.push({ role: 'user', content: text });

  const loading = document.createElement('div');
  loading.className = 'msg-ai-wrap';
  loading.innerHTML = '<div class="msg-ai" style="color:#aaa">正在思考…</div>';
  document.getElementById('chatMsgs').appendChild(loading);
  scrollChat();

  try {
    const s = SCENARIOS[curSc];
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: s.systemPrompt },
          ...chatHistory.slice(-12)
        ],
        stream: false,
        max_tokens: 300,
        temperature: 0.8
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const raw = data.choices[0].message.content;
    const parts = raw.split('---SPLIT---');
    const charReply = parts[0].trim();
    let correction = null;
    if (parts[1]) {
      try { correction = JSON.parse(parts[1].trim()); } catch(e) {}
    }
    chatHistory.push({ role: 'assistant', content: charReply });
    loading.remove();
    addAIMsg(charReply, correction);
  } catch(e) {
    loading.remove();
    addSysMsg('⚠️ 连接失败：' + e.message + '。请检查网络或 API Key。');
  }
  btn.disabled = false;
}

function chatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

let recognition = null;
let isListening = false;
let pendingAutoSend = false;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addSysMsg('⚠️ 语音功能需要 Chrome 浏览器，请用 Chrome 打开此网页。');
    return null;
  }
  const r = new SR();
  r.lang = 'en-US';
  r.continuous = false;
  r.interimResults = false;
  r.onresult = (e) => {
    const text = e.results[0][0].transcript;
    const inp = document.getElementById('chatIn');
    inp.value = text;
    autoH(inp);
    resetMicBtn();
    if (pendingAutoSend) {
      pendingAutoSend = false;
      setTimeout(() => sendChat(), 150);
    }
  };
  r.onerror = () => resetMicBtn();
  r.onend = () => resetMicBtn();
  return r;
}

function startMic(e) {
  e.preventDefault();
  if (isListening) return;
  if (!recognition) recognition = initSpeech();
  if (!recognition) return;
  try {
    pendingAutoSend = true;
    recognition.start();
    isListening = true;
    const btn = document.getElementById('micBtn');
    btn.classList.add('listening');
    btn.textContent = '🔴 松开发送';
  } catch(err) { resetMicBtn(); }
}

function stopMicAndSend(e) {
  if (e) e.preventDefault();
  if (!isListening) return;
  isListening = false;
  try { recognition && recognition.stop(); } catch(err) {}
}

function resetMicBtn() {
  isListening = false;
  const btn = document.getElementById('micBtn');
  if (btn) { btn.classList.remove('listening'); btn.textContent = '🎤 按住说话'; }
}
function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

/* ERROR NOTEBOOK */
function renderNBScreen() {
  const nb = getNB();
  const keys = Object.keys(nb);
  const content = document.getElementById('nbContent');
  if (keys.length === 0) {
    content.innerHTML = '<div class="nb-empty">错词本是空的 🎉<br>在词汇闪卡中标记不认识的词，它们会出现在这里。</div>';
    return;
  }
  const byScene = {};
  keys.forEach(k => {
    const { scIdx, vocabIdx } = nb[k];
    if (!byScene[scIdx]) byScene[scIdx] = [];
    byScene[scIdx].push(vocabIdx);
  });
  content.innerHTML = Object.keys(byScene).map(si => {
    const s = SCENARIOS[si];
    const words = byScene[si].map(vi => {
      const v = s.vocab[vi];
      const safeEn = v.en.replace(/'/g, "\\'");
      return `<div class="nb-word">
        <div class="nb-word-main">
          <div class="nb-en">${v.en}</div>
          <div class="nb-zh">${v.zh}</div>
          <div class="nb-ex">"${v.ex}"</div>
        </div>
        <div class="nb-actions">
          <button class="nb-tts" onclick="speak('${safeEn}')">🔊</button>
          <button class="nb-del" onclick="delNBWord(${si},${vi})">删除</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="nb-scenario">
      <div class="nb-sc-title">场景 ${s.num} · ${s.title}</div>
      ${words}
    </div>`;
  }).join('');
}

function delNBWord(si, vi) {
  removeFromNB(si, vi);
  renderNBScreen();
}

renderHome();
</script>
